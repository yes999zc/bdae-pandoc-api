            | No | Risk | Category | Findings | Suggestion | Must Cost (USD) | Potential
            Risk Cost (USD) | Ranking |

            |---|---|---|---|---|---|---|---|

            | 1 | 风险名称 | Environmental | 发现描述（简洁，1-2句） | 具体可执行建议 | 估算金额或范围 | 估算金额或范围
